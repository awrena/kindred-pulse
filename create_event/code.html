<!DOCTYPE html>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                    "secondary-container": "#8ef4e9",
                    "on-primary": "#fff7f5",
                    "inverse-primary": "#fd8863",
                    "on-secondary-fixed": "#004843",
                    "tertiary": "#7a5a00",
                    "on-tertiary-container": "#584000",
                    "error-dim": "#70030f",
                    "outline-variant": "#bcb19b",
                    "primary-fixed": "#ffad94",
                    "primary": "#a04223",
                    "error-container": "#f56965",
                    "tertiary-dim": "#6b4e00",
                    "primary-dim": "#903618",
                    "on-secondary-fixed-variant": "#006760",
                    "surface-container-high": "#f3e7d2",
                    "on-tertiary": "#fff8f1",
                    "on-tertiary-fixed": "#402d00",
                    "surface-container-highest": "#eee1ca",
                    "on-tertiary-fixed-variant": "#634900",
                    "surface-container-low": "#fdf2e2",
                    "on-surface": "#393222",
                    "on-primary-container": "#712003",
                    "surface-dim": "#e6d9bf",
                    "surface-tint": "#a04223",
                    "on-background": "#393222",
                    "tertiary-fixed-dim": "#efb520",
                    "outline": "#837a66",
                    "surface-container-lowest": "#ffffff",
                    "on-surface-variant": "#675e4c",
                    "error": "#ac3434",
                    "surface": "#fff8f1",
                    "tertiary-fixed": "#fec330",
                    "inverse-surface": "#110e06",
                    "on-error": "#fff7f6",
                    "surface-container": "#f8edda",
                    "surface-bright": "#fff8f1",
                    "surface-variant": "#eee1ca",
                    "secondary-fixed-dim": "#7fe6db",
                    "secondary": "#006b64",
                    "inverse-on-surface": "#a49c8f",
                    "tertiary-container": "#fec330",
                    "on-primary-fixed": "#4f1200",
                    "on-secondary": "#e2fffa",

                    "secondary-fixed": "#8ef4e9"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"

            "fontFamily": {
                    "headline": ["Plus Jakarta Sans"],
                    "body": ["Be Vietnam Pro"],
                    "label": ["Be Vietnam Pro"]

      }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .tonal-shift-no-lines {
            background-color: #fff8f1;
        }
        .flat-no-shadows {
            box-shadow: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface antialiased min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#fff8f1] dark:bg-stone-900 flex justify-between items-center px-6 py-4 w-full">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full overflow-hidden bg-surface-container-highest">
<img alt="User profile" class="w-full h-full object-cover" data-alt="Close up portrait of a friendly smiling person with warm lighting in a cozy cafe setting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDSZPWf9s9odt8hHKGdb23s41Is4hz186NUevuZ9vbm-7BLRTatLIblPPXp3CsJDq_WZCebVQcewEs9O085k9e586Utr0Fl7ZG3ON5hiSqaeWGGKG0uF4icgPNi11wkOGg1fS_8KnO-562yXqQ7-EU-JgmamZl2YxLwDbTSnhOaI7xyMQiVNYxIuxE2g53t4eFxF2qzJ_SNwwDQTd308XBMk54VWWIPVdZgQ__3SGYkIG8YHR9ahKc3qpgfqrB3-1Ju1csyi6vB7Cs"/>
</div>
<h1 class="font-headline font-bold text-2xl tracking-tight text-[#a04223] dark:text-[#ffad94]">Hello, Team!</h1>
</div>
<button class="p-2 text-stone-500 dark:text-stone-400 hover:bg-stone-100 dark:hover:bg-stone-800 rounded-full transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined">notifications</span>
</button>
</header>
<main class="flex-grow pt-24 pb-32 px-6 max-w-2xl mx-auto w-full">
<!-- Editorial Header -->
<section class="mb-10">
<h2 class="font-headline text-[3.5rem] leading-[1.1] font-extrabold tracking-tight mb-4 text-primary">
                Create Event
            </h2>
<p class="text-on-surface-variant text-lg">Gather your crew. We Are Still Here and ready for connection.</p>
</section>
<form class="space-y-10">
<!-- Activity Selection -->
<div class="space-y-4">
<label class="font-headline font-bold text-xl block ml-2">What's the vibe?</label>
<div class="flex flex-wrap gap-3">
<button class="px-6 py-3 rounded-lg bg-tertiary-container text-on-tertiary-container font-semibold transition-all scale-105 shadow-md flex items-center gap-2" type="button">
<span class="material-symbols-outlined">coffee</span> Coffee
                    </button>
<button class="px-6 py-3 rounded-lg bg-surface-container-high text-on-surface-variant font-medium hover:bg-surface-container-highest transition-all flex items-center gap-2" type="button">
<span class="material-symbols-outlined">restaurant</span> Lunch
                    </button>
<button class="px-6 py-3 rounded-lg bg-surface-container-high text-on-surface-variant font-medium hover:bg-surface-container-highest transition-all flex items-center gap-2" type="button">
<span class="material-symbols-outlined">sports_kabaddi</span> Darts
                    </button>
<button class="px-6 py-3 rounded-lg bg-surface-container-high text-on-surface-variant font-medium hover:bg-surface-container-highest transition-all flex items-center gap-2" type="button">
<span class="material-symbols-outlined">directions_walk</span> Walk
                    </button>
<button class="px-6 py-3 rounded-lg bg-surface-container-high text-on-surface-variant font-medium hover:bg-surface-container-highest transition-all flex items-center gap-2" type="button">
<span class="material-symbols-outlined">cake</span> Cake
                    </button>
</div>
</div>
<!-- Time Selection -->
<div class="space-y-4">
<label class="font-headline font-bold text-xl block ml-2">When are we meeting?</label>
<div class="grid grid-cols-3 gap-4">
<button class="p-4 rounded-lg bg-surface-container-high text-on-surface text-center font-semibold hover:bg-secondary-container hover:text-on-secondary-container transition-all" type="button">
                        Now
                    </button>
<button class="p-4 rounded-lg bg-surface-container-high text-on-surface text-center font-semibold hover:bg-secondary-container hover:text-on-secondary-container transition-all" type="button">
                        In 10 min
                    </button>
<button class="p-4 rounded-lg bg-secondary-container text-on-secondary-container text-center font-semibold border-2 border-secondary/20" type="button">
                        In 30 min
                    </button>
</div>
</div>
<!-- Location Input -->
<div class="space-y-4">
<label class="font-headline font-bold text-xl block ml-2">Where to?</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-primary">location_on</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-highest rounded-lg border-none focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all text-lg placeholder:text-on-surface-variant/50" placeholder="Search a place or address" type="text"/>
</div>
</div>
<!-- Bento Layout for Toggle & Counter -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="p-6 bg-surface-container-low rounded-xl flex items-center justify-between">
<div>
<p class="font-bold text-lg">Limited spots</p>
<p class="text-sm text-on-surface-variant">Keep it intimate</p>
</div>
<div class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox"/>
<div class="w-14 h-8 bg-surface-container-highest rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-1 after:left-1 after:bg-white after:rounded-full after:h-6 after:w-6 after:transition-all peer-checked:bg-secondary"></div>
</div>
</div>
<div class="p-6 bg-surface-container-low rounded-xl flex items-center justify-between">
<div>
<p class="font-bold text-lg">Capacity</p>
<p class="text-sm text-on-surface-variant">Max people</p>
</div>
<div class="flex items-center gap-4 bg-surface-container-highest px-4 py-2 rounded-full">
<button class="text-primary font-bold text-xl" type="button">−</button>
<span class="font-bold text-xl w-6 text-center">4</span>
<button class="text-primary font-bold text-xl" type="button">+</button>
</div>
</div>
</div>
<!-- Submit Button -->
<button class="w-full py-6 rounded-xl bg-gradient-to-br from-[#a04223] to-[#ffad94] text-white font-headline font-extrabold text-2xl shadow-lg hover:shadow-xl transition-all active:scale-[0.98] mt-8" type="submit">
                Blast it out!
            </button>
</form>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 rounded-t-[3rem] bg-[#fff8f1]/80 dark:bg-stone-900/80 backdrop-blur-xl shadow-[0_-10px_40px_rgba(57,50,34,0.05)] flex justify-around items-center px-8 pb-8 pt-4 w-full">
<a class="flex flex-col items-center justify-center text-stone-500 dark:text-stone-400 p-3 hover:text-[#a04223] dark:hover:text-[#ffad94] transition-all" href="#">
<span class="material-symbols-outlined">home</span>
</a>
<a class="flex flex-col items-center justify-center text-stone-500 dark:text-stone-400 p-3 hover:text-[#a04223] dark:hover:text-[#ffad94] transition-all" href="#">
<span class="material-symbols-outlined">event</span>
</a>
<a class="flex flex-col items-center justify-center bg-gradient-to-br from-[#a04223] to-[#ffad94] text-white rounded-[24px] p-3 scale-110 shadow-lg transition-all" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">add_circle</span>
</a>
<a class="flex flex-col items-center justify-center text-stone-500 dark:text-stone-400 p-3 hover:text-[#a04223] dark:hover:text-[#ffad94] transition-all" href="#">
<span class="material-symbols-outlined">person</span>
</a>
</nav>
</body></html>
